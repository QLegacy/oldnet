<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>500 | Lost in Space</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: none; } /* Скрыл стандартный курсор */
        #emoji-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .emoji { position: absolute; font-size: 40px; }
        /* Визуальный круг радиуса */
        #cursor-circle {
            position: fixed; pointer-events: none; border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%; z-index: 99; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<div id="cursor-circle"></div>
<div id="emoji-layer"></div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;
const RADIUS = 2; // Радиус взаимодействия

const cursorCircle = document.getElementById('cursor-circle');
// Масштабируем круг относительно радиуса (примерный коэффициент)
cursorCircle.style.width = (RADIUS * 30) + 'px';
cursorCircle.style.height = (RADIUS * 30) + 'px';

canvas.width = W; canvas.height = H;
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(W, H);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 1000);
camera.position.z = 30; 

function createTex(lines, size=150, color='#fff', bg='#cc0033') {
    const c = document.createElement('canvas'); c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = bg; ctx.fillRect(0,0,512,512);
    ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.font = `bold ${size}px Arial`;
    ctx.fillText(lines[0], 256, 200);
    ctx.font = `bold 50px Arial`;
    ctx.fillText(lines[1], 256, 300);
    ctx.fillText(lines[2], 256, 360);
    return new THREE.CanvasTexture(c);
}

const cubeGroup = new THREE.Group();
const cube = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshBasicMaterial({map: createTex(["ERR500", "Сервер", "потерялся"], 135)}));
cubeGroup.add(cube);

const btnTex = new THREE.CanvasTexture((() => {
    const bC = document.createElement('canvas'); bC.width = 256; bC.height = 128;
    const bCtx = bC.getContext('2d');
    bCtx.fillStyle = '#fff'; bCtx.fillRect(0,0,256,128);
    bCtx.fillStyle = '#000'; bCtx.textAlign = 'center'; bCtx.font = 'bold 25px Arial'; bCtx.fillText('Поплакать', 128, 75);
    return bC;
})());

const btn = new THREE.Mesh(new THREE.PlaneGeometry(3, 1.5), new THREE.MeshBasicMaterial({map: btnTex}));
btn.position.set(0, -3.1, 0); 
btn.rotation.set(Math.PI/2, 0, 0);
cubeGroup.add(btn);
const buttons = [btn];
scene.add(cubeGroup);

const items = [];
for(let i=0; i<300; i++) {
    const m = new THREE.Mesh(new THREE.TetrahedronGeometry(0.5), new THREE.MeshNormalMaterial());
    m.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*40, 0);
    m.userData = {v: new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, 0)};
    scene.add(m); items.push(m);
}

window.addEventListener('mousemove', (e) => {
    cursorCircle.style.left = e.clientX + 'px';
    cursorCircle.style.top = e.clientY + 'px';
    
    const mouse = new THREE.Vector2((e.clientX/W)*2-1, -(e.clientY/H)*2+1);
    const vecMouse = new THREE.Vector3(mouse.x * 25, mouse.y * 20, 0);
    items.forEach(m => {
        if(m.position.distanceTo(vecMouse) < RADIUS) {
            const force = m.position.clone().sub(vecMouse).normalize().multiplyScalar(0.4);
            m.userData.v.add(force);
        }
    });
});

window.addEventListener('click', (e) => {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2((e.clientX/W)*2-1, -(e.clientY/H)*2+1), camera);
    if(raycaster.intersectObjects(buttons).length > 0) {
        for(let i=0; i<2000; i++) {
            const el = document.createElement('div');
            el.className = 'emoji'; el.innerHTML = '😭';
            el.style.left = Math.random()*100 + 'vw'; el.style.top = Math.random()*100 + 'vh';
            document.getElementById('emoji-layer').appendChild(el);
        }
        setTimeout(() => window.close(), 1000);
    }
});

let cubeV = new THREE.Vector3(0.15, 0.1, 0);
function animate(){
    requestAnimationFrame(animate);
    cubeGroup.position.add(cubeV);
    if(Math.abs(cubeGroup.position.x)>20) cubeV.x *= -1;
    if(Math.abs(cubeGroup.position.y)>12) cubeV.y *= -1;
    cubeGroup.rotation.y += 0.01;
    cubeGroup.rotation.x += 0.005;

    items.forEach(m => {
        m.position.add(m.userData.v);
        m.userData.v.multiplyScalar(0.995);
        if(Math.abs(m.position.x)>25 || Math.abs(m.position.y)>20) m.userData.v.multiplyScalar(-1);
    });
    renderer.render(scene, camera);
}
animate();
})();
</script>
</body>
</html>
